<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>改變生命未來式 Be A Better You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #FFD700;
            --dark: #000000;
            --bg: #F9FAFB;
            --card-border: 4px solid #000;
            --card-shadow: 6px 6px 0px #000;
            --card-radius: 0.5rem;
            --card-rotate: 0deg;
            --bg-pattern: radial-gradient(rgba(0,0,0,0.1) 1.5px, transparent 1.5px);
            --bg-size: 20px 20px;
        }

        /* 風格名稱動畫 */
        @keyframes giantTextPop {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(-5deg); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.1) rotate(1deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }
        #giantThemeName {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5000; font-size: 15vw; font-weight: 900; color: var(--dark);
            text-shadow: 4px 4px 0px white, -2px -2px 0px white;
            pointer-events: none; white-space: nowrap; display: none;
            font-style: italic; letter-spacing: -0.02em; line-height: 1;
        }
        #giantThemeName.active { display: block; animation: giantTextPop 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        /* 洗牌動畫 */
        @keyframes shuffleShake {
            0% { transform: translate(0, 0) rotate(0); }
            20% { transform: translate(4px, -4px) rotate(2deg); }
            40% { transform: translate(-4px, 4px) rotate(-2deg); }
            60% { transform: translate(4px, 4px) rotate(2deg); }
            80% { transform: translate(-4px, -4px) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }
        .shuffle-active { animation: shuffleShake 0.5s ease-in-out infinite; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg); background-image: var(--bg-pattern); background-size: var(--bg-size);
            color: var(--dark); margin: 0; padding: 0; 
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1), color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        .sticky-nav { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 1rem 0; border-bottom: 1px solid rgba(0,0,0,0.05); transition: background 1.2s ease; }

        #cardsGrid { 
            display: grid; gap: 1rem; width: 100%; grid-template-columns: repeat(3, 1fr); padding: 1rem;
            grid-auto-rows: min-content;
        }
        @media (min-width: 768px) { #cardsGrid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 1024px) { #cardsGrid { grid-template-columns: repeat(7, 1fr); } }

        .card-container { 
            perspective: 1000px; position: relative; width: 100%; aspect-ratio: 1; 
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .card-inner {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
            border-radius: var(--card-radius); border: var(--card-border);
            box-shadow: var(--card-shadow); overflow: hidden;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-front { background-color: var(--primary); color: #000; font-weight: 900; }
        .card-back { background-color: white !important; transform: rotateY(180deg); font-size: 3rem; }

        .card-emoji-bg {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 3.6rem; opacity: 0.35; z-index: 1; pointer-events: none;
        }
        .card-number-text { position: relative; z-index: 10; pointer-events: none; }

        .card-completed .card-front { 
            background-color: #f3f4f6 !important; color: #9ca3af !important; border-color: #d1d5db !important; opacity: 0.8; 
        }

        #categorySelect, .nav-btn, .stat-box {
            background: #fff !important; border: 2px solid #000 !important; box-shadow: 2px 2px 0px #000 !important;
            font-weight: 900; color: #000 !important;
        }
        .stat-box { min-width: 90px; text-align: center; padding: 0.4rem 0.8rem; }

        .modal-close-btn {
            position: absolute; top: -15px; right: -15px; width: 36px; height: 36px;
            background: black; color: white; border: 3px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1100; cursor: pointer;
        }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .star-rating .star { color: #ccc; cursor: pointer; font-size: 1.8rem; }
        .star-rating .star.active { color: #FFD700; }

        .tab-btn {
            padding: 0.3rem 0.75rem; font-weight: 900; border: 2px solid black; border-radius: 99px;
            white-space: nowrap; font-size: 0.7rem; transition: all 0.2s; background: white; color: black;
        }
        .tab-btn.active { background: black !important; color: white !important; }
    </style>
</head>
<body class="theme-pop" onclick="window.initInteraction()">
    <div id="giantThemeName">風格名稱</div>

    <div id="aiLoading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-8 border-black mb-4"></div>
        <p class="text-black font-black text-2xl italic">數據載入中...</p>
    </div>

    <nav class="sticky-nav">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="stat-box">
                        <p class="text-[9px] font-black uppercase opacity-60 leading-none mb-1">已翻開</p>
                        <p id="statCompleted" class="text-xl font-black">0</p>
                    </div>
                    <div class="stat-box">
                        <p class="text-[9px] font-black uppercase opacity-60 leading-none mb-1">剩餘牌卡</p>
                        <p id="statRemaining" class="text-xl font-black">0</p>
                    </div>
                    <div id="welcomeContainer" class="hidden flex items-center gap-3">
                         <div id="welcomeMsg" class="text-sm font-black text-black/70 tracking-tight"></div>
                         <button onclick="window.editName()" class="text-black/30 hover:text-black transition-colors" title="修改名字">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"></path></svg>
                         </button>
                    </div>
                </div>

                <div class="flex items-center gap-3 w-full md:auto">
                    <button onclick="window.randomStyle()" class="nav-btn whitespace-nowrap text-sm px-4">切換視覺 🎨</button>
                    <div class="relative flex-grow md:flex-grow-0">
                        <select id="categorySelect" class="w-full text-sm" onchange="window.switchCategory(this.value)">
                            <option disabled selected>載入中...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <main id="cardsGrid"></main>
        <footer class="mt-12 mb-20 flex flex-wrap justify-center gap-4">
            <button onclick="window.shuffleGame()" class="bg-black text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[4px_4px_0px_#444] text-sm hover:translate-y-1 hover:shadow-none transition-all">重新洗牌 🔀</button>
            <button onclick="window.openRecordModal()" class="bg-pink-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[4px_4px_0px_#000] text-sm">翻牌紀錄 📜</button>
            <button onclick="window.shareApp()" class="bg-emerald-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[4px_4px_0px_#000] text-sm">分享網頁 🚀</button>
        </footer>
    </div>

    <!-- 姓名輸入視窗 -->
    <div id="nameModal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white border-8 border-black p-10 w-full max-w-md shadow-[12px_12px_0px_#FFD700] relative">
            <h2 class="text-3xl font-black italic mb-6 uppercase text-black">改變生命未來式</h2>
            <p class="font-bold mb-6 text-black">輸入名字開始旅程：</p>
            <input type="text" id="userNameInput" placeholder="在此輸入..." class="w-full border-4 border-black p-4 text-2xl font-black outline-none mb-8 bg-gray-50 text-black">
            <button onclick="window.saveUserName()" class="w-full bg-black text-white p-5 font-black text-2xl uppercase shadow-[6px_6px_0px_#888] active:translate-y-1 active:shadow-none transition-all">確認 🎯</button>
        </div>
    </div>

    <!-- 答案彈窗 -->
    <div id="answerOverlay" onclick="window.closeAnswer()" class="fixed inset-0 bg-black/80 z-[999] hidden items-center justify-center p-8 md:p-20 backdrop-blur-sm cursor-pointer">
        <div id="answerContent" class="bg-white w-full max-w-md min-h-[45vh] max-h-[80vh] border-8 border-black flex flex-col items-center justify-between p-6 md:p-8 relative cursor-default shadow-[20px_20px_0px_white] rounded-3xl" onclick="event.stopPropagation()">
            <div class="modal-close-btn" onclick="window.closeAnswer()">✕</div>
            
            <div class="relative z-20 flex flex-col items-center w-full text-center flex-grow justify-center overflow-hidden">
                <div id="answerCategoryTag" class="text-base font-black uppercase mb-4 bg-black text-white px-4 py-1 skew-x-[-12deg] inline-block">分類</div>
                
                <div id="textFitContainer" class="w-full flex-grow flex items-center justify-center overflow-hidden py-2">
                    <div id="overlayText" class="font-black leading-[1.2] text-black w-full px-2" style="font-size: 42px;"></div>
                </div>

                <button onclick="window.shareSingleCard()" class="bg-black text-white px-5 py-2 font-black text-[9px] border-2 border-white uppercase tracking-widest hover:bg-gray-800 mb-2 mt-4">分享此卡 📸</button>
            </div>

            <div id="ratingSection" class="z-20 w-full flex flex-col items-center gap-2 bg-gray-50 p-4 border-t-4 border-black rounded-b-2xl shrink-0">
                <p class="font-black text-black italic text-[9px] uppercase tracking-wider">評分本次解答</p>
                <div class="star-rating flex flex-row flex-nowrap whitespace-nowrap gap-1 justify-center" id="starRatingContainer">
                    <span class="star" onclick="window.updateRatingFromUI(1)">★</span>
                    <span class="star" onclick="window.updateRatingFromUI(2)">★</span>
                    <span class="star" onclick="window.updateRatingFromUI(3)">★</span>
                    <span class="star" onclick="window.updateRatingFromUI(4)">★</span>
                    <span class="star" onclick="window.updateRatingFromUI(5)">★</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 翻牌紀錄視窗 -->
    <div id="recordModal" onclick="window.closeRecordModal()" class="fixed inset-0 bg-black/60 z-[1000] hidden items-center justify-center p-8 cursor-pointer">
        <div class="bg-white border-8 border-black w-full max-w-2xl max-h-[85vh] flex flex-col shadow-[15px_15px_0px_white] cursor-default relative" onclick="event.stopPropagation()">
            <div class="modal-close-btn" onclick="window.closeRecordModal()">✕</div>
            <div class="p-4 border-b-8 border-black flex flex-col bg-pink-400">
                <div class="flex justify-between items-center mb-4 pr-6">
                    <h2 class="text-xl font-black uppercase italic text-black">翻牌紀錄 📜</h2>
                    <button onclick="window.shareRecordAsImage()" class="bg-black text-white text-[9px] px-3 py-1.5 font-black border-2 border-white uppercase hover:bg-gray-800">匯出 📸</button>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="recordTabs">
                    <button onclick="window.changeRecordTab('all')" class="tab-btn active" data-tab="all">全部</button>
                    <button onclick="window.changeRecordTab('unrated')" class="tab-btn" data-tab="unrated">未評價</button>
                    <button onclick="window.changeRecordTab('star5')" class="tab-btn" data-tab="star5">5★</button>
                    <button onclick="window.changeRecordTab('star4')" class="tab-btn" data-tab="star4">4★</button>
                    <button onclick="window.changeRecordTab('star3')" class="tab-btn" data-tab="star3">3★</button>
                    <button onclick="window.changeRecordTab('star2')" class="tab-btn" data-tab="star2">2★</button>
                    <button onclick="window.changeRecordTab('star1')" class="tab-btn" data-tab="star1">1★</button>
                </div>
            </div>
            <div id="favoriteList" class="p-6 overflow-y-auto space-y-4 flex-grow bg-white"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 font-black text-lg border-4 border-white shadow-2xl z-[1000] transition-all opacity-0 pointer-events-none uppercase"></div>

    <div id="exportTemplate" style="position:fixed; top:0; left:-5000px; width:1000px; background:white; font-family:'PingFang TC', sans-serif; color:black;">
        <div id="exportInner" style="padding: 60px;">
            <div style="text-align:center;">
                <h1 style="font-size: 48px; font-weight: 900; margin: 0; letter-spacing: 2px;">改變生命未來式 Be A Better You</h1>
                <p id="exportSenderInfo" style="font-size: 28px; color: #666; font-weight: bold; margin: 20px 0 30px 0;">寄送人：安安 | 2026年02月27日 01:56</p>
            </div>
            <div style="height: 6px; background: black; width: 100%; margin-bottom: 80px;"></div>
            <div id="exportCardsList"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = { PROGRESS: 'better_you_progress_v3', METADATA: 'better_you_metadata_v3', USERNAME: 'better_you_user_name' };
        const MANDATORY_CARD = "安麗解答之書程式與視覺設計ver1.0 - 寰宇杜杜龍創辦人白金 2026.2.26";
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1HufZqMwvvZh735nBMvKnDDI-BnZMUuYmFTA0_3B2lCE/export?format=csv";

        const THEMES = [
            { id: "pop", name: "普普風" }, { id: "cloud", name: "雲朵風" }, { id: "leaf", name: "自然風" },
            { id: "gem", name: "鑽石風" }, { id: "stamp", name: "郵票風" }, { id: "bold", name: "粗獷風" },
            { id: "pill", name: "藥丸風" }, { id: "slanted", name: "歪斜風" }, { id: "double", name: "經典風" },
            { id: "organic", name: "有機風" }, { id: "ticket", name: "票券風" }, { id: "shadow", name: "立體風" },
            { id: "retro-lcd", name: "懷舊風" }, { id: "frame", name: "畫框風" }, { id: "bubble", name: "泡泡風" },
            { id: "blueprint", name: "藍圖風" }, { id: "origami", name: "摺紙風" }, { id: "candy-cane", name: "糖果風" },
            { id: "tech-light", name: "科技風" }, { id: "notebook", name: "筆記風" }
        ];

        let gameData = {}, categoryProgress = {}, cardMetadata = {};
        let currentCategory = '', currentCardIndex = null, isAnimating = false, currentThemeId = 'pop';
        let audioCtx = null, currentTab = 'all', shakeEnabled = false, lastShakeTime = 0;

        window.initInteraction = () => { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
            requestShakePermission();
        };

        function requestShakePermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => { if (response === 'granted') initShake(); });
            } else { initShake(); }
        }

        function initShake() {
            if (shakeEnabled) return;
            shakeEnabled = true;
            window.addEventListener('devicemotion', (event) => {
                const acc = event.accelerationIncludingGravity;
                if (!acc) return;
                // 設定高閾值 (需非常用力)
                const total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (total > 30) { 
                    const now = Date.now();
                    if (now - lastShakeTime > 2500) { triggerShakeFlip(); lastShakeTime = now; }
                }
            });
        }

        function triggerShakeFlip() {
            if (currentCategory !== 'all' || document.getElementById('answerOverlay').classList.contains('flex')) return;
            const unflip = [];
            document.querySelectorAll('.card-container:not(.card-completed)').forEach(el => {
                const idStr = el.querySelector('.card-inner').id; // card-cat-idx-displayIdx
                const parts = idStr.split('-');
                unflip.push({ cat: parts[1], idx: parseInt(parts[2]), displayIdx: parseInt(parts[3]) });
            });
            if (unflip.length === 0) return;
            const target = unflip[Math.floor(Math.random() * unflip.length)];
            window.handleCardClick(target.cat, target.idx, target.displayIdx);
            showToast("神秘的力量為您翻開了一張牌！✨");
        }

        function playSound(type) { 
            if (!audioCtx) return; 
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), now = audioCtx.currentTime;
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pop') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'shuffle') {
                for(let i=0; i<5; i++){
                    const t = now + (i*0.05);
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(400 + (i*100), t);
                    g.gain.setValueAtTime(0.01, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
                    o.start(t); o.stop(t+0.05);
                }
            }
        }

        window.initApp = async () => {
            const loading = document.getElementById('aiLoading');
            if (loading) loading.style.display = 'flex';
            const name = localStorage.getItem(STORAGE_KEYS.USERNAME);
            if (name) updateWelcomeUI(name);
            const prog = localStorage.getItem(STORAGE_KEYS.PROGRESS);
            if (prog) { 
                const data = JSON.parse(prog); 
                Object.keys(data).forEach(cat => { categoryProgress[cat] = new Set(data[cat]); }); 
            }
            const meta = localStorage.getItem(STORAGE_KEYS.METADATA);
            if (meta) { cardMetadata = JSON.parse(meta); }
            await autoImport();
            window.randomStyle(true);
            if (loading) loading.style.display = 'none';
        };

        function updateWelcomeUI(name) {
            const container = document.getElementById('welcomeContainer');
            const msg = document.getElementById('welcomeMsg');
            if (name && container && msg) {
                msg.textContent = `歡迎 ${name} 一起改變生命未來式`;
                container.classList.remove('hidden');
            }
        }

        window.editName = () => {
            document.getElementById('userNameInput').value = localStorage.getItem(STORAGE_KEYS.USERNAME) || "";
            document.getElementById('nameModal').classList.remove('hidden');
        };

        window.saveUserName = () => {
            const val = document.getElementById('userNameInput').value.trim();
            if (!val) { showToast("請輸入名字"); return; }
            localStorage.setItem(STORAGE_KEYS.USERNAME, val);
            updateWelcomeUI(val);
            document.getElementById('nameModal').classList.add('hidden');
            showToast("名字已更新！");
        };

        async function autoImport() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csv = await response.text();
                const rows = parseCSV(csv), newData = {};
                if (rows.length > 0) {
                    const headers = rows[0].map(h => h ? h.trim() : "");
                    headers.forEach((h, col) => { 
                        if (h && h !== '未分類') { 
                            newData[h] = []; 
                            for (let r=1; r<rows.length; r++) if(rows[r][col]) newData[h].push(rows[r][col].trim()); 
                        } 
                    });
                    applyNewGameData(newData);
                }
            } catch (err) { showToast("連線異常"); }
        }

        function applyNewGameData(newData) {
            gameData = newData; 
            Object.keys(gameData).forEach(cat => { if (!gameData[cat].includes(MANDATORY_CARD)) gameData[cat].push(MANDATORY_CARD); });
            const select = document.getElementById('categorySelect');
            if (select) {
                select.innerHTML = '<option value="all">✨ 全部解答 ✨</option>';
                Object.keys(gameData).forEach((cat) => {
                    if (!categoryProgress[cat]) categoryProgress[cat] = new Set();
                    gameData[cat].sort(() => Math.random() - 0.5);
                    const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; select.appendChild(opt);
                });
            }
            window.switchCategory('all');
        }

        window.switchCategory = (cat) => {
            currentCategory = cat; renderCards(); updateStats();
        };

        function renderCards() {
            const grid = document.getElementById('cardsGrid'); grid.innerHTML = '';
            let items = [];
            if (currentCategory === 'all') {
                Object.keys(gameData).forEach(cat => {
                    gameData[cat].forEach((txt, idx) => { if (txt !== MANDATORY_CARD) items.push({ cat, idx, text: txt }); });
                });
                items.unshift({ cat: '宇宙指引', idx: -1, text: MANDATORY_CARD });
            } else {
                gameData[currentCategory].forEach((txt, idx) => { items.push({ cat: currentCategory, idx, text: txt }); });
            }

            items.forEach((item, i) => {
                const isDragon = (item.text === MANDATORY_CARD);
                const done = (categoryProgress[item.cat]?.has(item.idx) || false);
                const container = document.createElement('div');
                container.className = `card-container ${done ? 'card-completed' : ''}`;
                container.innerHTML = `
                    <div class="card-inner" id="card-${item.cat}-${item.idx}-${i}">
                        <div class="card-face card-front">
                            <div class="card-emoji-bg">${isDragon ? '🐲' : '💎'}</div>
                            <span class="card-number-text text-2xl font-black">${i + 1}</span>
                        </div>
                        <div class="card-face card-back">${done ? '👑' : '🐲'}</div>
                    </div>`;
                container.onclick = () => window.handleCardClick(item.cat, item.idx, i);
                grid.appendChild(container);
            });
        }

        function fitTextToContainer() {
            const textEl = document.getElementById('overlayText');
            const container = document.getElementById('textFitContainer');
            if (!textEl || !container) return;
            let size = 42; 
            const minSize = 14; 
            textEl.style.fontSize = size + 'px';
            const maxHeight = container.clientHeight;
            while (textEl.scrollHeight > maxHeight && size > minSize) {
                size -= 1;
                textEl.style.fontSize = size + 'px';
            }
        }

        window.handleCardClick = (cat, idx, displayIdx) => {
            if (isAnimating) return;
            const text = (idx === -1) ? MANDATORY_CARD : gameData[cat][idx];
            const el = document.getElementById(`card-${cat}-${idx}-${displayIdx}`);
            if(el) {
                el.classList.add('is-flipped');
                setTimeout(() => {
                    const back = el.querySelector('.card-back');
                    if(back) back.textContent = '👑';
                }, 200);
            }
            
            setTimeout(() => {
                document.getElementById('overlayText').textContent = text;
                document.getElementById('answerCategoryTag').textContent = cat;
                document.getElementById('ratingSection').style.display = (text === MANDATORY_CARD) ? 'none' : 'flex';
                updateStarUI(cardMetadata[text]?.rating || 0);
                currentCardIndex = { cat, idx, text, displayIdx };
                document.getElementById('answerOverlay').classList.replace('hidden', 'flex');
                requestAnimationFrame(() => fitTextToContainer());
                playSound('pop');
            }, 350);
        };

        window.shuffleGame = () => {
            playSound('shuffle');
            const targets = document.querySelectorAll('.card-container:not(.card-completed)');
            targets.forEach(el => el.classList.add('shuffle-active'));
            Object.keys(gameData).forEach(cat => {
                const prog = categoryProgress[cat];
                const unIdx = [], unTxt = [];
                gameData[cat].forEach((t, i) => { if (!prog.has(i)) { unIdx.push(i); unTxt.push(t); } });
                unTxt.sort(() => Math.random() - 0.5);
                unIdx.forEach((orig, i) => { gameData[cat][orig] = unTxt[i]; });
            });
            setTimeout(() => { 
                targets.forEach(el => el.classList.remove('shuffle-active'));
                renderCards(); 
                showToast("牌卡已重新洗牌 🌀"); 
            }, 600);
        };

        window.randomStyle = (skip) => {
            const next = THEMES[Math.floor(Math.random() * THEMES.length)];
            currentThemeId = next.id;
            document.body.className = `theme-${next.id}`;
            const h = Math.floor(Math.random() * 360);
            const primary = `hsl(${h}, 90%, 75%)`;
            const bg = `hsl(${h}, 40%, 97%)`;
            document.documentElement.style.setProperty('--primary', primary);
            document.documentElement.style.setProperty('--bg', bg);
            if (!skip) {
                const g = document.getElementById('giantThemeName'); g.textContent = next.name; g.classList.remove('active');
                void g.offsetWidth; g.classList.add('active');
            }
        };

        window.updateRatingFromUI = (s) => {
            const info = currentCardIndex;
            cardMetadata[info.text] = { rating: s, category: info.cat, flipTimestamp: Date.now() };
            localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
            updateStarUI(s); showToast(`評分成功 ${s}★`);
        };

        window.updateRatingFromFav = (text, cat, s) => {
            cardMetadata[text] = { rating: s, category: cat, flipTimestamp: Date.now() };
            localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
            filterFavs();
        };

        function updateStarUI(s) { document.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('active', i < s)); }

        window.closeAnswer = () => {
            const info = currentCardIndex;
            if (!info) return;
            document.getElementById('answerOverlay').classList.replace('flex', 'hidden');
            const el = document.getElementById(`card-${info.cat}-${info.idx}-${info.displayIdx}`);
            if (el) el.classList.remove('is-flipped');
            if (info.idx !== -1 && !categoryProgress[info.cat]?.has(info.idx)) {
                categoryProgress[info.cat].add(info.idx);
                if (!cardMetadata[info.text]) cardMetadata[info.text] = { category: info.cat, flipTimestamp: Date.now(), rating: 0 };
                const obj = {}; Object.keys(categoryProgress).forEach(c => obj[c] = Array.from(categoryProgress[c]));
                localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(obj));
                localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
                renderCards(); updateStats();
            }
            currentCardIndex = null;
        };

        function updateStats() {
            let total = 0, done = 0;
            Object.keys(gameData).forEach(cat => {
                total += gameData[cat].filter(t => t !== MANDATORY_CARD).length;
                gameData[cat].forEach((t, i) => { if (t !== MANDATORY_CARD && categoryProgress[cat].has(i)) done++; });
            });
            document.getElementById('statCompleted').textContent = done;
            document.getElementById('statRemaining').textContent = total - done;
        }

        window.openRecordModal = () => { 
            if (!localStorage.getItem(STORAGE_KEYS.USERNAME)) { document.getElementById('nameModal').classList.remove('hidden'); return; }
            document.getElementById('recordModal').classList.replace('hidden', 'flex'); filterFavs(); 
        };
        window.closeRecordModal = () => { document.getElementById('recordModal').classList.replace('flex', 'hidden'); };
        window.changeRecordTab = (tab) => { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tab)); filterFavs(); };

        function filterFavs() {
            const list = document.getElementById('favoriteList'); list.innerHTML = '';
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] })).filter(i => i.text !== MANDATORY_CARD);
            
            if (currentTab === 'unrated') items = items.filter(i => (i.rating || 0) === 0);
            else if (currentTab.startsWith('star')) {
                const s = parseInt(currentTab.replace('star',''));
                items = items.filter(i => i.rating === s);
            }
            
            if (items.length === 0) { list.innerHTML = '<p class="text-center opacity-30 italic p-10">尚無內容</p>'; return; }
            items.sort((a,b) => b.flipTimestamp - a.flipTimestamp);
            items.forEach(i => {
                const d = document.createElement('div'); d.className = "bg-gray-50 border-4 border-black p-4 shadow-[4px_4px_0px_black]";
                let ss = ''; for(let n=1; n<=5; n++) ss += `<span class="list-star ${n<=(i.rating||0)?'active text-yellow-500':'text-gray-300'} cursor-pointer" onclick="window.updateRatingFromFav('${i.text.replace(/'/g,"\\'")}', '${i.category}', ${n})">★</span>`;
                d.innerHTML = `<div class="flex justify-between items-start mb-2"><span class="bg-black text-white text-[10px] px-2 py-1 italic uppercase">${i.category}</span><div class="flex gap-1">${ss}</div></div><p class="font-black text-lg text-black leading-snug">${i.text}</p>`;
                list.appendChild(d);
            });
        }

        const getSenderName = () => localStorage.getItem(STORAGE_KEYS.USERNAME) || "安安";

        window.shareSingleCard = async () => {
            const info = currentCardIndex; if (!info) return;
            const time = new Date().toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g,'年').replace(' ','日 ');
            document.getElementById('exportSenderInfo').textContent = `寄送人：${getSenderName()} | ${time}`;
            document.getElementById('exportCardsList').innerHTML = `<div style="display:flex; align-items:flex-start;"><div style="width: 15px; height: 160px; background: black; margin-right: 30px;"></div><div><div style="font-size: 28px; color: #666; font-weight: bold; margin-bottom: 20px;">[ ${info.cat} ]</div><div style="font-size: 52px; font-weight: 900; line-height: 1.3;">${info.text}</div></div></div>`;
            captureAndShare();
        };

        window.shareRecordAsImage = async () => {
            const time = new Date().toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g,'年').replace(' ','日 ');
            document.getElementById('exportSenderInfo').textContent = `寄送人：${getSenderName()} | ${time}`;
            const list = document.getElementById('exportCardsList'); list.innerHTML = '';
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] })).filter(i => i.text !== MANDATORY_CARD);
            if(items.length === 0) return;
            items.forEach(i => {
                list.innerHTML += `<div style="display:flex; align-items:flex-start; margin-bottom: 60px;"><div style="width: 12px; height: 120px; background: black; margin-right: 25px;"></div><div><div style="font-size: 20px; color: #666; font-weight: bold; margin-bottom: 10px;">[ ${i.category} ]</div><div style="font-size: 38px; font-weight: 900; line-height: 1.3;">${i.text}</div></div></div>`;
            });
            captureAndShare();
        };

        async function captureAndShare() {
            showToast("生成圖片中...");
            const temp = document.getElementById('exportTemplate');
            try {
                const canvas = await html2canvas(temp, { scale: 2, backgroundColor: 'white' });
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                const file = new File([blob], 'BetterYou.png', { type: 'image/png' });
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) && navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '改變生命未來式' });
                } else {
                    const l = document.createElement('a'); l.download = 'BeABetterYou.png'; l.href = canvas.toDataURL(); l.click();
                    showToast("已下載 💾");
                }
            } catch (e) { showToast("失敗"); }
        }

        window.shareApp = async () => { const d = { title: '改變生命未來式', url: window.location.href }; if (navigator.share) await navigator.share(d); else { const i = document.createElement('input'); i.value = window.location.href; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i); showToast("連結已複製"); } };
        function parseCSV(t) { let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0; for (let l of t) { if ('"' === l) { if (s && l === p) row[i] += l; s = !s; } else if (',' === l && s) l = row[++i] = ''; else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = row[i = 0] = '']; } else row[i] += l; p = l; } return ret; }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500); }

        window.initApp();
    </script>
</body>
</html>
