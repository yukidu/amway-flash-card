<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你人生的解答之書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #FFD700;
            --dark: #000000;
            --bg: #F0F0F0;
            --card-border: 4px solid #000;
            --card-shadow: 6px 6px 0px #000;
            --card-radius: 0.5rem;
            --bg-pattern: radial-gradient(#d1d1d1 1.5px, transparent 1.5px);
            --bg-size: 20px 20px;
        }

        /* --- 12 種風格 --- */
        body.theme-pop { --bg: #F0F0F0; --dark: #000; --card-border: 4px solid #000; --card-shadow: 6px 6px 0px #000; --card-radius: 0.25rem; --bg-pattern: radial-gradient(#ccc 1.5px, transparent 1.5px); --bg-size: 15px 15px; }
        body.theme-neon { --bg: #0a0a0c; --dark: #fff; --card-border: 2px solid var(--primary); --card-shadow: 0 0 15px var(--primary); --card-radius: 1rem; --bg-pattern: linear-gradient(to right, #1a1a1a 1px, transparent 1px), linear-gradient(to bottom, #1a1a1a 1px, transparent 1px); --bg-size: 40px 40px; }
        body.theme-minimal { --bg: #ffffff; --dark: #333; --card-border: 1px solid #e2e8f0; --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); --card-radius: 1.5rem; --bg-pattern: none; }
        body.theme-retro { --bg: #f4ecd8; --dark: #5d4037; --card-border: 2px dashed #5d4037; --card-shadow: 4px 4px 0px #d7ccc8; --card-radius: 0; --bg-pattern: repeating-linear-gradient(45deg, #efebe9, #efebe9 10px, #f4ecd8 10px, #f4ecd8 20px); }
        body.theme-chalk { --bg: #1a3a3a; --dark: #fff; --card-border: 3px solid #fff; --card-shadow: 4px 4px 0px rgba(255,255,255,0.2); --card-radius: 0.5rem; --bg-pattern: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); --bg-size: 30px 30px; }
        body.theme-candy { --bg: #fff5f8; --dark: #ff6baf; --card-border: 4px solid #ff6baf; --card-shadow: 6px 6px 0px #ffd1e3; --card-radius: 2rem; --bg-pattern: radial-gradient(#ffd1e3 2px, transparent 2px); --bg-size: 25px 25px; }
        body.theme-luxury { --bg: #1a1a1a; --dark: #d4af37; --card-border: 2px solid #d4af37; --card-shadow: 0 0 20px rgba(212,175,55,0.3); --card-radius: 0; --bg-pattern: linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222), linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222); --bg-size: 60px 60px; }
        body.theme-blueprint { --bg: #0047ab; --dark: #fff; --card-border: 1px solid rgba(255,255,255,0.5); --card-shadow: 0 0 0 4px #0047ab, 0 0 0 5px white; --card-radius: 0; --bg-pattern: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); --bg-size: 20px 20px; }
        body.theme-pixel { --bg: #6185f2; --dark: #fff; --card-border: 6px double #fff; --card-shadow: 8px 8px 0px #000; --card-radius: 0; --bg-pattern: none; image-rendering: pixelated; }
        body.theme-forest { --bg: #e8f5e9; --dark: #2e7d32; --card-border: 4px solid #2e7d32; --card-shadow: 6px 6px 0px #a5d6a7; --card-radius: 1rem; --bg-pattern: radial-gradient(#c8e6c9 2px, transparent 2px); --bg-size: 40px 40px; }
        body.theme-galaxy { --bg: #020617; --dark: #94a3b8; --card-border: 2px solid #38bdf8; --card-shadow: 0 0 15px rgba(56,189,248,0.5); --card-radius: 2rem; --bg-pattern: radial-gradient(white 1px, transparent 1px); --bg-size: 50px 50px; }
        body.theme-comic { --bg: #ffffff; --dark: #000; --card-border: 5px solid #000; --card-shadow: 10px 10px 0px #fde047; --card-radius: 0; --bg-pattern: radial-gradient(#eee 3px, transparent 3px); --bg-size: 12px 12px; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg); background-image: var(--bg-pattern); background-size: var(--bg-size);
            color: var(--dark); margin: 0; padding: 0; transition: all 0.5s ease;
        }

        html { overflow-y: scroll; scrollbar-gutter: stable !important; }

        #cardsGrid { display: grid; gap: 1.5rem; width: 100%; grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 640px) { #cardsGrid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 768px) { #cardsGrid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 1024px) { #cardsGrid { grid-template-columns: repeat(7, 1fr); } }

        .card-container { perspective: 1000px; position: relative; width: 100%; aspect-ratio: 1; }
        .card-inner {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
            border-radius: var(--card-radius); border: var(--card-border);
            box-shadow: var(--card-shadow); overflow: hidden; transition: all 0.4s ease;
        }

        .card-front { background-color: var(--primary); color: #000; font-size: 2.5rem; font-weight: 900; position: relative; }
        .card-back { background-color: white !important; transform: rotateY(180deg); padding: 8px; font-size: 3rem; display: flex; align-items: center; justify-content: center; }

        .card-completed .card-front { background-color: #eee !important; color: #666 !important; border-color: #bbb; box-shadow: none; opacity: 1; }

        .card-icon-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.15; pointer-events: none; z-index: 10; padding: 15%; }
        .card-number-text { position: relative; z-index: 20; }

        .tab-btn { border: var(--card-border); box-shadow: var(--card-shadow); transition: all 0.2s; border-radius: var(--card-radius); }
        .tab-active { filter: brightness(0.8) contrast(1.2); transform: scale(1.05); outline: 3px solid white; }

        @keyframes popIn { 0% { transform: scale(0.5) rotate(-10deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { transition: all 0.5s ease; border: var(--card-border); box-shadow: var(--card-shadow); border-width: 10px; }
        .stat-box { color: #000 !important; }
        .stat-label { color: rgba(0,0,0,0.6) !important; }

        .star-rating { display: flex; gap: 0.5rem; font-size: 2rem; cursor: pointer; }
        .star { color: #ccc; transition: transform 0.2s; }
        .star.active { color: #FFD700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        
        .star-empty { color: #ccc; opacity: 0.1; }
        .star-filled { color: #fbbf24; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 龍 Icon SVG 樣式 */
        .dragon-icon { width: 100%; height: 100%; fill: currentColor; }
    </style>
</head>
<body class="theme-pop" onclick="handleUserInteraction()">
    <div id="aiLoading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-8 border-black mb-4"></div>
        <p class="text-black font-black text-2xl italic">載入中...</p>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black italic mb-6 tracking-tighter uppercase">你人生的解答之書 <span id="styleName" class="text-indigo-600">普普!</span></h1>
            <div id="categoryTabs" class="flex flex-wrap justify-center gap-4 mb-8"></div>
            <div class="flex justify-center items-center gap-6 mb-6">
                <div class="bg-white border-4 border-black p-4 shadow-[6px_6px_0px_#000] min-w-[120px] stat-box">
                    <p class="text-xs font-black uppercase stat-label">已翻開</p>
                    <p id="statCompleted" class="text-4xl font-black">0</p>
                </div>
                <div class="bg-white border-4 border-black p-4 shadow-[6px_6px_0px_#000] min-w-[120px] stat-box">
                    <p class="text-xs font-black uppercase stat-label">剩餘</p>
                    <p id="statRemaining" class="text-4xl font-black">0</p>
                </div>
            </div>
            <p class="text-sm font-bold bg-yellow-300 inline-block px-3 py-1 border-2 border-black italic">用力「甩動」手機跨分類隨機抽牌！ 📱</p>
        </header>

        <main id="cardsGrid"></main>

        <footer class="mt-12 mb-20 flex flex-wrap justify-center gap-6">
            <button id="shuffleBtn" onclick="shuffleGame()" class="bg-black text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#444] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">隨機洗牌 🔀</button>
            <button onclick="randomStyle()" class="bg-indigo-600 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">更換風格 🎨</button>
            <button onclick="openFavoriteModal()" class="bg-pink-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">收藏清單 🌟</button>
            <button onclick="openEditModal()" class="bg-white text-black px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">編輯內容 ✏️</button>
            <button onclick="shareApp()" class="bg-emerald-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all flex items-center gap-2">
                分享遊戲
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
            </button>
        </footer>
    </div>

    <!-- 答案彈窗 -->
    <div id="answerOverlay" onclick="closeAnswer()" class="fixed inset-0 bg-black/80 z-[999] hidden items-center justify-center p-6 backdrop-blur-sm cursor-pointer">
        <div id="answerContent" class="bg-white w-full max-w-2xl min-h-[45vh] modal-content flex flex-col items-center justify-between p-8 relative overflow-hidden cursor-default">
            <div class="relative z-20 flex flex-col items-center w-full text-center mt-4 pointer-events-none">
                <div id="answerCategoryTag" class="text-2xl font-black uppercase mb-6 bg-black text-white px-6 py-2 skew-x-[-12deg]">分類</div>
                <div id="overlayText" class="text-4xl md:text-6xl font-black leading-tight break-words w-full text-black mb-8"></div>
            </div>
            <div id="ratingSection" onclick="event.stopPropagation()" class="z-20 w-full flex flex-col items-center gap-4 bg-gray-50 p-6 border-t-4 border-black">
                <p class="font-black text-black italic uppercase">給予星級評分 (自動收藏)</p>
                <div class="star-rating" id="starRatingContainer">
                    <span class="star" onclick="updateRatingFromUI(1)">★</span>
                    <span class="star" onclick="updateRatingFromUI(2)">★</span>
                    <span class="star" onclick="updateRatingFromUI(3)">★</span>
                    <span class="star" onclick="updateRatingFromUI(4)">★</span>
                    <span class="star" onclick="updateRatingFromUI(5)">★</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 收藏清單視窗 -->
    <div id="favoriteModal" onclick="closeFavoriteModal()" class="fixed inset-0 bg-black/60 z-[1000] hidden items-center justify-center p-4 cursor-pointer">
        <div class="bg-white border-8 border-black w-full max-w-2xl max-h-[90vh] flex flex-col shadow-[15px_15px_0px_#000] cursor-default">
            <div class="p-4 border-b-8 border-black flex flex-col bg-pink-400" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black uppercase italic text-black">評分收藏 🌟</h2>
                    <button id="exportJpegBtn" onclick="shareListAsImage()" class="bg-black text-white text-xs px-4 py-2 font-black border-2 border-white hover:bg-white hover:text-black transition-colors uppercase flex items-center gap-1">分享圖片 📸</button>
                </div>
                <div id="favFilterContainer" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
            </div>
            <div id="favoriteList" class="p-6 overflow-y-auto space-y-4 flex-grow bg-white"></div>
            <div class="p-4 border-t-8 border-black bg-gray-100 text-center text-xs font-black opacity-40 uppercase italic">點擊背景或視窗任一處關閉</div>
        </div>
    </div>

    <!-- 編輯視窗 -->
    <div id="editModal" onclick="closeEditModal()" class="fixed inset-0 bg-black/60 z-40 hidden items-center justify-center p-4 cursor-pointer">
        <div class="bg-white border-8 border-black w-full max-w-2xl max-h-[90vh] flex flex-col shadow-[15px_15px_0px_#000] cursor-default">
            <div class="p-4 border-b-8 border-black bg-yellow-400" onclick="event.stopPropagation()">
                <h2 class="text-2xl font-black uppercase italic">編輯內容 ✏️</h2>
            </div>
            <div id="editList" class="p-6 overflow-y-auto space-y-3 flex-grow bg-white"></div>
            <div class="p-6 border-t-8 border-black bg-gray-100 flex gap-4" onclick="event.stopPropagation()">
                <button onclick="saveAnswers()" class="flex-1 bg-green-500 text-white py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000]">儲存內容</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 font-black text-lg border-4 border-white shadow-2xl z-[1000] transition-all opacity-0 pointer-events-none uppercase"></div>

    <script>
        const MANDATORY_CARD = "程式與視覺設計 杜杜龍創辦人白金 2026.2";
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1HufZqMwvvZh735nBMvKnDDI-BnZMUuYmFTA0_3B2lCE/export?format=csv";

        const THEMES = [
            { id: "pop", name: "普普" }, { id: "neon", name: "霓虹" }, { id: "minimal", name: "極簡" },
            { id: "retro", name: "復古" }, { id: "chalk", name: "黑板" }, { id: "candy", name: "糖果" },
            { id: "luxury", name: "奢華" }, { id: "blueprint", name: "藍圖" }, { id: "pixel", name: "像素" },
            { id: "forest", name: "森林" }, { id: "galaxy", name: "星際" }, { id: "comic", name: "漫畫" }
        ];

        // 龍 Icon SVG 定義
        const DRAGON_SVG = `
            <svg class="dragon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12,2C10.89,2 10,2.89 10,4C10,4.55 10.22,5.05 10.59,5.41L8.41,7.59C8.05,7.22 7.55,7 7,7C5.89,7 5,7.89 5,9C5,9.55 5.22,10.05 5.59,10.41L3.41,12.59C3.05,12.22 2.55,12 2,12C0.89,12 0,12.89 0,14C0,15.11 0.89,16 2,16C2.55,16 3.05,15.78 3.41,15.41L5.59,17.59C5.22,17.95 5,18.45 5,19C5,20.11 5.89,21 7,21C7.55,21 8.05,20.78 8.41,20.41L10.59,22.59C10.95,22.95 11.45,23.17 12,23.17C12.55,23.17 13.05,22.95 13.41,22.59L15.59,20.41C15.95,20.78 16.45,21 17,21C18.11,21 19,20.11 19,19C19,18.45 18.78,17.95 18.41,17.59L20.59,15.41C20.95,15.78 21.45,16 22,16C23.11,16 24,15.11 24,14C24,12.89 23.11,12 22,12C21.45,12 20.95,12.22 20.59,12.59L18.41,10.41C18.78,10.05 19,9.55 19,9C19,7.89 18.11,7 17,7C16.45,7 15.95,7.22 15.59,7.59L13.41,5.41C13.78,5.05 14,4.55 14,4C14,2.89 13.11,2 12,2M12,4L13.5,6L12,7.5L10.5,6L12,4M7,9L8.5,10.5L7,12L5.5,10.5L7,9M17,9L18.5,10.5L17,12L15.5,10.5L17,9M2,14L3.5,15.5L2,17L0.5,15.5L2,14M22,14L23.5,15.5L22,17L20.5,15.5L22,14M7,19L8.5,20.5L7,22L5.5,20.5L7,19M17,19L18.5,20.5L17,22L15.5,20.5L17,19M12,11A3,3 0 0,1 15,14A3,3 0 0,1 12,17A3,3 0 0,1 9,14A3,3 0 0,1 12,11Z"/>
            </svg>`;
        
        let gameData = {}, categoryProgress = {}, categoryColors = {}, cardMetadata = {}, flipHistory = [];
        let currentCategory = '', currentCardIndex = null, currentFavFilter = 'all', isShuffling = false, isAnimating = false;
        let audioCtx = null;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), now = audioCtx.currentTime;
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pop') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'victory') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }

        function randomStyle() {
            const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
            document.body.className = `theme-${theme.id}`;
            document.getElementById('styleName').textContent = theme.name + '!';
            if (currentCategory) switchCategory(currentCategory);
        }

        function handleUserInteraction() { initAudio(); enableShake(); }

        let lastShakeUpdate = 0;
        function handleMotion(event) {
            let curTime = Date.now();
            if ((curTime - lastShakeUpdate) > 100) {
                let acc = event.acceleration || event.accelerationIncludingGravity;
                if (!acc || acc.x === null) return;
                let strength = Math.max(Math.abs(acc.x), Math.abs(acc.y), Math.abs(acc.z));
                if (strength > 50) {
                    if (document.getElementById('answerOverlay').classList.contains('hidden') && !isAnimating) {
                        flipRandomCard(); lastShakeUpdate = curTime + 1500;
                    }
                }
            }
        }

        function enableShake() {
            if (window.DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('devicemotion', handleMotion); });
            } else window.addEventListener('devicemotion', handleMotion);
        }

        window.onload = async () => { randomStyle(); await autoImportFromGoogleSheets(); };

        async function autoImportFromGoogleSheets() {
            const loading = document.getElementById('aiLoading'); loading.style.display = 'flex';
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csv = await response.text();
                const rows = parseCSV(csv), newData = {};
                if (rows.length > 0) {
                    const headers = rows[0].map(h => h ? h.trim() : "");
                    headers.forEach((h, col) => {
                        if (h) {
                            newData[h] = [];
                            for (let r=1; r<rows.length; r++) if(rows[r][col]) newData[h].push(rows[r][col].trim());
                        }
                    });
                    applyNewGameData(newData);
                }
            } catch (err) { showToast("同步失敗"); } finally { loading.style.display = 'none'; initKeyboardSupport(); }
        }

        function applyNewGameData(newData) {
            gameData = newData; checkMandatory(); categoryProgress = {}; categoryColors = {};
            const palette = ["#FF0000", "#0000FF", "#FF00FF", "#00FFFF", "#32CD32", "#FF4500", "#FFD700", "#7FFF00", "#FF1493", "#00FA9A"];
            Object.keys(gameData).forEach((cat, idx) => {
                categoryColors[cat] = palette[idx % palette.length];
                categoryProgress[cat] = new Set();
                gameData[cat].sort(() => Math.random() - 0.5);
            });
            renderTabs(); const first = Object.keys(gameData)[0]; if(first) switchCategory(first);
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs'); container.innerHTML = '';
            Object.keys(gameData).forEach(cat => {
                const btn = document.createElement('button');
                btn.id = `tab-${cat}`; btn.textContent = cat;
                btn.className = "tab-btn px-6 py-2 font-black uppercase text-sm transition-all";
                btn.style.backgroundColor = categoryColors[cat];
                btn.onclick = () => switchCategory(cat);
                container.appendChild(btn);
            });
        }

        function switchCategory(cat) {
            currentCategory = cat; document.documentElement.style.setProperty('--primary', categoryColors[cat]);
            document.querySelectorAll('#categoryTabs button').forEach(b => b.classList.remove('tab-active'));
            const tab = document.getElementById(`tab-${cat}`);
            if (tab) tab.classList.add('tab-active');
            renderCards(false); updateStats();
        }

        function renderCards(skip = true) {
            const grid = document.getElementById('cardsGrid'), items = gameData[currentCategory] || [], prog = categoryProgress[currentCategory] || new Set();
            grid.innerHTML = '';
            items.forEach((text, i) => {
                const done = prog.has(i), icon = DRAGON_SVG;
                const container = document.createElement('div');
                container.className = `card-container ${done ? 'card-completed' : ''}`;
                container.innerHTML = `
                    <div class="card-inner" id="card-${i}" onclick="handleCardClick(${i})">
                        <div class="card-face card-front">
                            <span class="card-number-text">${i+1}</span>
                            ${done ? `<div class="card-icon-overlay">${icon}</div>` : ''}
                        </div>
                        <div class="card-face card-back" style="border-color: ${categoryColors[currentCategory]}">
                            <div style="width:50%; height:50%;">${icon}</div>
                        </div>
                    </div>`;
                grid.appendChild(container);
                if (!skip) { container.style.opacity = '0'; setTimeout(() => { container.style.opacity = '1'; container.classList.add('animate-pop'); }, i*15); }
            });
        }

        function handleCardClick(idx) {
            if (isShuffling || isAnimating) return;
            isAnimating = true; currentCardIndex = idx;
            if (flipHistory[flipHistory.length-1] !== idx) flipHistory.push(idx);
            document.getElementById(`card-${idx}`).classList.add('is-flipped');
            const text = gameData[currentCategory][idx], mandatory = (text === MANDATORY_CARD);
            if (!cardMetadata[text]) cardMetadata[text] = { rating: 0, category: currentCategory };
            setTimeout(() => {
                document.getElementById('overlayText').textContent = text;
                document.getElementById('answerCategoryTag').textContent = currentCategory;
                document.getElementById('ratingSection').style.display = mandatory ? 'none' : 'flex';
                updateStarUI(cardMetadata[text].rating);
                document.getElementById('answerOverlay').classList.replace('hidden', 'flex');
                if (mandatory) playSound('victory'); else playSound('pop');
                isAnimating = false;
            }, 350);
        }

        function updateRating(text, category, stars) {
            if (!cardMetadata[text]) cardMetadata[text] = { rating: 0, category: category };
            cardMetadata[text].rating = stars;
            if (!document.getElementById('answerOverlay').classList.contains('hidden')) updateStarUI(stars);
            if (!document.getElementById('favoriteModal').classList.contains('hidden')) filterFavs(currentFavFilter);
            showToast(`已評價 ${stars} 顆星！`);
        }

        function updateRatingFromUI(s) {
            const text = gameData[currentCategory][currentCardIndex];
            updateRating(text, currentCategory, s);
        }

        function updateStarUI(s) { document.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('active', i < s)); }

        function closeAnswer() {
            const overlay = document.getElementById('answerOverlay');
            if (overlay.classList.contains('hidden')) return;
            isAnimating = true; overlay.classList.replace('flex', 'hidden');
            const idx = currentCardIndex;
            const el = document.getElementById(`card-${idx}`);
            if (el) el.classList.remove('is-flipped');
            setTimeout(() => {
                if (!categoryProgress[currentCategory].has(idx)) { categoryProgress[currentCategory].add(idx); renderCards(true); updateStats(); }
                currentCardIndex = null; isAnimating = false;
            }, 350);
        }

        function openFavoriteModal() { document.getElementById('favoriteModal').classList.replace('hidden', 'flex'); updateFavFilters(); filterFavs('all'); }
        function closeFavoriteModal() { document.getElementById('favoriteModal').classList.replace('flex', 'hidden'); }

        function updateFavFilters() {
            const container = document.getElementById('favFilterContainer'); container.innerHTML = '';
            const existing = new Set(); Object.values(cardMetadata).forEach(m => { if(m.rating > 0) existing.add(m.rating); });
            container.appendChild(createFilterBtn('全部翻開', 'all'));
            [5,4,3,2,1].forEach(r => { if(existing.has(r)) container.appendChild(createFilterBtn('⭐'.repeat(r), `star-${r}`)); });
        }

        function createFilterBtn(t, v) {
            const btn = document.createElement('button'); btn.textContent = t;
            btn.className = `bg-white px-4 py-2 font-black border-2 border-black whitespace-nowrap text-sm text-black hover:bg-black hover:text-white transition-colors ${currentFavFilter === v ? 'bg-black text-white' : ''}`;
            btn.onclick = () => filterFavs(v);
            return btn;
        }

        function filterFavs(filter) {
            currentFavFilter = filter; updateFavFilters();
            const list = document.getElementById('favoriteList'), exportBtn = document.getElementById('exportJpegBtn');
            list.innerHTML = '';
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] }));
            if (filter.startsWith('star-')) items = items.filter(i => i.rating === parseInt(filter.split('-')[1]));
            exportBtn.classList.toggle('hidden', items.length === 0);
            items.sort((a, b) => b.rating - a.rating || a.text.localeCompare(b.text));
            if (items.length === 0) { list.innerHTML = '<div class="text-black font-black text-center p-10 opacity-30 italic text-black">尚無評分紀錄</div>'; return; }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 border-4 border-black p-4 flex flex-col items-center sm:items-start gap-2 shadow-[4px_4px_0px_#000]";
                div.onclick = (e) => e.stopPropagation();
                let starsHTML = '';
                for(let i=1; i<=5; i++) {
                    const activeClass = i <= item.rating ? 'star-filled' : 'star-empty';
                    starsHTML += `<span class="${activeClass} cursor-pointer hover:scale-125 transition-transform" onclick="event.stopPropagation(); updateRating('${item.text.replace(/'/g, "\\'")}', '${item.category}', ${i})">⭐</span>`;
                }
                div.innerHTML = `<div class="w-full text-black text-center sm:text-left text-black"><span class="text-xs font-black bg-black text-white px-2 py-0.5 mb-1 inline-block uppercase italic">${item.category}</span><p class="font-black text-lg mb-1">${item.text}</p><div class="flex justify-center sm:justify-start gap-1 text-xl">${starsHTML}</div></div>`;
                list.appendChild(div);
            });
        }

        async function shareListAsImage() {
            showToast("正在產生圖片...");
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] }));
            let titleText = "評分收藏清單";
            if (currentFavFilter.startsWith('star-')) {
                const starCount = currentFavFilter.split('-')[1];
                items = items.filter(i => i.rating === parseInt(starCount));
                titleText = `評分收藏清單 (${starCount}顆星)`;
            }
            const tempDiv = document.createElement('div');
            Object.assign(tempDiv.style, { position: 'fixed', top: '0', left: '-5000px', width: '500px', background: 'white', color: 'black', padding: '40px', fontFamily: 'sans-serif' });
            tempDiv.innerHTML = `<h1 style="font-size:24px; font-weight:900; border-bottom:4px solid black; margin-bottom:20px; padding-bottom:10px;">${titleText}</h1><div id="tempItemsContainer"></div><div style="margin-top:30px; text-align:right; font-size:12px; color:#cccccc; font-weight:bold; letter-spacing:1px;">杜杜龍牌卡</div>`;
            const container = tempDiv.querySelector('#tempItemsContainer');
            items.sort((a,b) => b.rating - a.rating).forEach(item => { container.innerHTML += `<div style="margin-bottom:15px; border-left:8px solid black; padding-left:12px;"><div style="font-size:12px; font-weight:900; opacity:0.6;">[ ${item.category} ]</div><div style="font-size:18px; font-weight:800; line-height:1.4;">${item.text}</div></div>`; });
            document.body.appendChild(tempDiv);
            try {
                const canvas = await html2canvas(tempDiv, { scale: 2 });
                canvas.toBlob(async (blob) => {
                    const fileName = `收藏清單_${new Date().getTime()}.jpg`;
                    const file = new File([blob], fileName, { type: "image/jpeg" });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: titleText, text: '分享我的評分收藏清單！' }); } catch (err) {}
                    } else {
                        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = fileName; link.click();
                        showToast("瀏覽器不支持直接分享，已為您下載圖片！");
                    }
                }, 'image/jpeg', 0.9);
            } catch (e) { showToast("產生圖片失敗"); } finally { document.body.removeChild(tempDiv); }
        }

        async function shareApp() {
            if (navigator.share) {
                try { await navigator.share({ title: '你人生的解答之書', text: '這是一本能指引你人生方向的解答之書，快來試試看！', url: window.location.href }); } catch (err) {}
            } else {
                try {
                    const tempInput = document.createElement('input'); document.body.appendChild(tempInput);
                    tempInput.value = window.location.href; tempInput.select();
                    document.execCommand('copy'); document.body.removeChild(tempInput);
                    showToast("已為您複製遊戲連結！");
                } catch (e) { showToast("複製連結失敗"); }
            }
        }

        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) { if (s && l === p) row[i] += l; s = !s; }
                else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = row[i = 0] = '']; }
                else row[i] += l;
                p = l;
            }
            return ret;
        }

        function checkMandatory() { Object.keys(gameData).forEach(cat => { if (!gameData[cat].includes(MANDATORY_CARD)) gameData[cat].push(MANDATORY_CARD); }); }
        function updateStats() {
            const d = gameData[currentCategory] || [], done = (categoryProgress[currentCategory] || new Set()).size;
            document.getElementById('statCompleted').textContent = done; document.getElementById('statRemaining').textContent = d.length - done;
        }

        function shuffleGame() {
            if (isShuffling || isAnimating) return;
            isShuffling = true;
            document.querySelectorAll('.card-container').forEach((c, i) => { c.style.transition = "all 0.4s"; c.style.transform = "scale(0) rotate(180deg)"; c.style.opacity = '0'; });
            setTimeout(() => { gameData[currentCategory].sort(() => Math.random() - 0.5); categoryProgress[currentCategory] = new Set(); renderCards(false); updateStats(); isShuffling = false; }, 500);
        }

        function openEditModal() {
            document.getElementById('editModal').classList.replace('hidden', 'flex');
            const list = document.getElementById('editList'); list.innerHTML = '';
            (gameData[currentCategory] || []).forEach(t => { if(t !== MANDATORY_CARD) addAnswerRow(t); });
        }

        function addAnswerRow(t = '') {
            const div = document.createElement('div'); div.className = 'flex gap-2 items-center bg-gray-50 p-4 border-4 border-black';
            div.onclick = (e) => e.stopPropagation();
            div.innerHTML = `<input type="text" value="${t}" class="item-text flex-grow font-black p-1 outline-none text-black"><button onclick="this.parentElement.remove()" class="text-2xl font-black text-black">🗑️</button>`;
            document.getElementById('editList').appendChild(div);
        }

        function saveAnswers() {
            const newList = []; document.querySelectorAll('#editList .item-text').forEach(i => { if(i.value.trim()) newList.push(i.value.trim()); });
            gameData[currentCategory] = newList; checkMandatory(); categoryProgress[currentCategory] = new Set();
            closeEditModal(); renderCards(false); updateStats();
        }

        function closeEditModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); }

        function initKeyboardSupport() {
            window.addEventListener('keydown', (e) => {
                const ans = document.getElementById('answerOverlay'), fav = document.getElementById('favoriteModal'), edt = document.getElementById('editModal');
                const open = !ans.classList.contains('hidden') || !fav.classList.contains('hidden') || !edt.classList.contains('hidden');
                if (open) { closeAnswer(); closeFavoriteModal(); closeEditModal(); return; }
                if (!isAnimating) {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); flipRandomCard(); }
                    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); if(flipHistory.length) handleCardClick(flipHistory[flipHistory.length-1]); }
                }
            });
        }

        function flipRandomCard() {
            const categories = Object.keys(gameData);
            if (categories.length === 0) return;
            let allAvailable = [];
            categories.forEach(cat => {
                const items = gameData[cat];
                const prog = categoryProgress[cat] || new Set();
                items.forEach((_, idx) => { if (!prog.has(idx)) allAvailable.push({ cat, idx }); });
            });
            let target;
            if (allAvailable.length > 0) { target = allAvailable[Math.floor(Math.random() * allAvailable.length)]; }
            else {
                const randomCat = categories[Math.floor(Math.random() * categories.length)];
                target = { cat: randomCat, idx: Math.floor(Math.random() * gameData[randomCat].length) };
            }
            if (currentCategory !== target.cat) switchCategory(target.cat);
            handleCardClick(target.idx);
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg;
            t.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }
    </script>
</body>
