<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>改變生命未來式 Be A Better You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #FFD700;
            --dark: #000000;
            --bg: #F0F0F0;
            --card-border: 4px solid #000;
            --card-shadow: 6px 6px 0px #000;
            --card-radius: 0.5rem;
            --card-rotate: 0deg;
            --bg-pattern: radial-gradient(#d1d1d1 1.5px, transparent 1.5px);
            --bg-size: 20px 20px;
        }

        /* 誇張的歡迎動畫 */
        @keyframes welcomePop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(10deg); }
            70% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-welcome { animation: welcomePop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 洗牌動畫 */
        @keyframes shuffleShake {
            0% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(5px, 5px) rotate(5deg); }
            50% { transform: translate(-5px, -5px) rotate(-5deg); }
            75% { transform: translate(5px, -5px) rotate(5deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
        .shuffle-active { animation: shuffleShake 0.4s ease-in-out infinite; }

        /* 超巨大風格名稱動畫 */
        @keyframes giantTextPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        #giantThemeName {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5000; font-size: 15vw; font-weight: 900; color: black;
            text-shadow: 10px 10px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white, 2px 2px 0px white, 0px 15px 30px rgba(0,0,0,0.5);
            pointer-events: none; white-space: nowrap; display: none;
            font-style: italic;
        }
        #giantThemeName.active { display: block; animation: giantTextPop 1.5s ease-out forwards; }

        /* --- 風格設定 --- */
        body.theme-pop { --bg: #f3f4f6; --dark: #000; --card-border: 4px solid #000; --card-shadow: 8px 8px 0px #000; --card-radius: 0; --card-rotate: -2deg; }
        body.theme-blueprint { --bg: #0047ab; --dark: #fff; --card-border: 1px solid rgba(255,255,255,0.5); --card-radius: 0; }
        /* 其他風格繼承之前定義... */

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg); background-image: var(--bg-pattern); background-size: var(--bg-size);
            color: var(--dark); margin: 0; padding: 0; transition: all 0.5s ease;
        }

        .sticky-nav { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 1rem 0; border-bottom: 2px solid rgba(0,0,0,0.1); transition: background 0.5s ease; }

        #cardsGrid { display: grid; gap: 1rem; width: 100%; grid-template-columns: repeat(3, 1fr); padding: 1rem; }
        @media (min-width: 768px) { #cardsGrid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 1024px) { #cardsGrid { grid-template-columns: repeat(7, 1fr); } }

        .card-container { perspective: 1000px; position: relative; width: 100%; aspect-ratio: 1; transition: transform 0.5s ease; }
        .card-inner {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
            border-radius: var(--card-radius); border: var(--card-border);
            box-shadow: var(--card-shadow); overflow: hidden;
        }

        .card-front { background-color: var(--primary); color: #000; font-weight: 900; }
        .card-back { background-color: white !important; transform: rotateY(180deg); font-size: 2.5rem; }

        .card-completed .card-front { 
            background-color: #e5e7eb !important; color: #6b7280 !important; border-color: #d1d5db !important; opacity: 0.85; filter: grayscale(0.2); 
        }

        #categorySelect, .nav-btn {
            appearance: none; background: #fff; border: 4px solid #000; box-shadow: 4px 4px 0px #000;
            font-weight: 900; padding: 0.5rem 1rem; border-radius: 0.5rem; color: #000 !important;
        }

        .stat-box {
            background: #fff; border: 4px solid #000; padding: 0.75rem 1.25rem; box-shadow: 4px 4px 0px #000;
            min-width: 110px; text-align: center; color: #000 !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="theme-pop" onclick="window.initAudio()">
    <div id="giantThemeName">風格名稱</div>

    <nav class="sticky-nav">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="stat-box">
                        <p class="text-[10px] font-black uppercase opacity-60 leading-none mb-1">已翻開</p>
                        <p id="statCompleted" class="text-3xl font-black">0</p>
                    </div>
                    <div class="stat-box">
                        <p class="text-[10px] font-black uppercase opacity-60 leading-none mb-1">剩餘牌卡</p>
                        <p id="statRemaining" class="text-3xl font-black">0</p>
                    </div>
                    <div id="welcomeContainer" class="hidden flex items-center gap-2">
                         <div id="welcomeMsg" class="text-lg font-black bg-white px-4 py-2 border-2 border-black shadow-[2px_2px_0px_black] text-black"></div>
                         <button onclick="window.editName()" class="bg-white border-2 border-black p-2 hover:bg-gray-100 shadow-[2px_2px_0px_black] text-sm">✏️</button>
                    </div>
                </div>

                <div class="flex items-center gap-3 w-full md:w-auto">
                    <button onclick="window.randomStyle()" class="nav-btn bg-indigo-100 whitespace-nowrap text-sm">切換視覺 🎨</button>
                    <div class="relative flex-grow md:flex-grow-0">
                        <select id="categorySelect" class="w-full text-sm" onchange="window.switchCategory(this.value)">
                            <option disabled selected>載入中...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <main id="cardsGrid"></main>

        <footer class="mt-12 mb-20 flex flex-wrap justify-center gap-4">
            <button onclick="window.shuffleGame()" class="bg-black text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#444] text-sm hover:translate-y-1 hover:shadow-none transition-all">重新洗牌 🔀</button>
            <button onclick="window.openRecordModal()" class="bg-pink-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] text-sm">翻牌紀錄 📜</button>
            <button onclick="window.shareApp()" class="bg-emerald-500 text-white px-8 py-4 font-black uppercase border-4 border-black shadow-[6px_6px_0px_#000] text-sm">分享網頁 🚀</button>
        </footer>
    </div>

    <!-- 姓名輸入視窗 -->
    <div id="nameModal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white border-8 border-black p-10 w-full max-w-md shadow-[12px_12px_0px_#FFD700]">
            <h2 class="text-4xl font-black italic mb-6 uppercase text-black">你是誰？</h2>
            <p class="font-bold mb-6 text-lg text-black">輸入您的名字，開啟改變之旅：</p>
            <input type="text" id="userNameInput" placeholder="在此輸入大名..." class="w-full border-4 border-black p-4 text-2xl font-black outline-none mb-8 bg-gray-50 text-black">
            <button onclick="window.saveUserName()" class="w-full bg-black text-white p-5 font-black text-2xl uppercase">確認變更 🎯</button>
        </div>
    </div>

    <!-- 答案彈窗 -->
    <div id="answerOverlay" onclick="window.closeAnswer()" class="fixed inset-0 bg-black/80 z-[999] hidden items-center justify-center p-6 backdrop-blur-sm cursor-pointer">
        <div id="answerContent" class="bg-white w-full max-w-2xl min-h-[45vh] modal-content flex flex-col items-center justify-between p-8 relative cursor-default" onclick="event.stopPropagation()">
            <div class="relative z-20 flex flex-col items-center w-full text-center mt-4">
                <div id="answerCategoryTag" class="text-2xl font-black uppercase mb-4 bg-black text-white px-6 py-1 skew-x-[-12deg]">分類</div>
                <div id="overlayText" class="text-3xl md:text-5xl font-black leading-tight text-black mb-10"></div>
                <button onclick="window.shareSingleCard()" class="bg-black text-white px-6 py-2 font-black text-xs border-2 border-white mb-6 uppercase tracking-widest hover:bg-gray-800">分享此卡 📸</button>
            </div>
            <div id="ratingSection" class="z-20 w-full flex flex-col items-center gap-4 bg-gray-50 p-6 border-t-4 border-black">
                <p class="font-black text-black italic text-xs uppercase">給予星級評分 (記錄本次解答)</p>
                <div class="star-rating" id="starRatingContainer">
                    <span class="star" data-s="1" onclick="window.updateRatingFromUI(1)">★</span>
                    <span class="star" data-s="2" onclick="window.updateRatingFromUI(2)">★</span>
                    <span class="star" data-s="3" onclick="window.updateRatingFromUI(3)">★</span>
                    <span class="star" data-s="4" onclick="window.updateRatingFromUI(4)">★</span>
                    <span class="star" data-s="5" onclick="window.updateRatingFromUI(5)">★</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 翻牌紀錄視窗 -->
    <div id="recordModal" onclick="window.closeRecordModal()" class="fixed inset-0 bg-black/60 z-[1000] hidden items-center justify-center p-4 cursor-pointer">
        <div class="bg-white border-8 border-black w-full max-w-2xl max-h-[90vh] flex flex-col shadow-[15px_15px_0px_#000] cursor-default" onclick="event.stopPropagation()">
            <div class="p-6 border-b-8 border-black flex flex-col bg-pink-400">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black uppercase italic text-black">翻牌紀錄 📜</h2>
                    <button onclick="window.shareRecordAsImage()" class="bg-black text-white text-xs px-6 py-3 font-black border-2 border-white uppercase hover:bg-gray-800">匯出目前清單 📸</button>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="recordTabs">
                    <button onclick="window.changeRecordTab('all')" class="tab-btn active" data-tab="all">全部紀錄</button>
                    <button onclick="window.changeRecordTab('rated')" class="tab-btn" data-tab="rated">已評價</button>
                    <button onclick="window.changeRecordTab('unrated')" class="tab-btn" data-tab="unrated">未評價</button>
                    <button onclick="window.changeRecordTab('star5')" class="tab-btn" data-tab="star5">5★</button>
                    <button onclick="window.changeRecordTab('star4')" class="tab-btn" data-tab="star4">4★</button>
                    <button onclick="window.changeRecordTab('star3')" class="tab-btn" data-tab="star3">3★</button>
                    <button onclick="window.changeRecordTab('star2')" class="tab-btn" data-tab="star2">2★</button>
                    <button onclick="window.changeRecordTab('star1')" class="tab-btn" data-tab="star1">1★</button>
                </div>
            </div>
            <div id="favoriteList" class="p-6 overflow-y-auto space-y-4 flex-grow bg-white"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 font-black text-lg border-4 border-white shadow-2xl z-[1000] transition-all opacity-0 pointer-events-none uppercase"></div>

    <!-- 匯出模板 -->
    <div id="exportTemplate" style="position:fixed; top:0; left:-5000px; width:1000px; background:white; font-family:'PingFang TC', sans-serif; color:black;">
        <div id="exportInner" style="padding: 60px;">
            <div style="text-align:center;">
                <h1 style="font-size: 48px; font-weight: 900; margin: 0; letter-spacing: 2px;">改變生命未來式 Be A Better You</h1>
                <p id="exportSenderInfo" style="font-size: 28px; color: #666; font-weight: bold; margin: 20px 0 30px 0;">寄送人：安安 | 2026年02月27日 01:56</p>
            </div>
            <div style="height: 6px; background: black; width: 100%; margin-bottom: 80px;"></div>
            <div id="exportCardsList"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = { PROGRESS: 'better_you_progress_v3', METADATA: 'better_you_metadata_v3', USERNAME: 'better_you_user_name' };
        const MANDATORY_CARD = "安麗解答之書程式與視覺設計ver1.0 - 寰宇杜杜龍創辦人白金 2026.2.26";
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1HufZqMwvvZh735nBMvKnDDI-BnZMUuYmFTA0_3B2lCE/export?format=csv";

        const THEMES = [
            { id: "pop", name: "普普風" }, { id: "cloud", name: "雲朵風" }, { id: "leaf", name: "自然風" },
            { id: "gem", name: "鑽石風" }, { id: "stamp", name: "郵票風" }, { id: "bold", name: "粗獷風" },
            { id: "pill", name: "藥丸風" }, { id: "slanted", name: "歪斜風" }, { id: "double", name: "經典風" },
            { id: "organic", name: "有機風" }, { id: "ticket", name: "票券風" }, { id: "shadow", name: "立體風" },
            { id: "retro-lcd", name: "懷舊風" }, { id: "frame", name: "畫框風" }, { id: "bubble", name: "泡泡風" },
            { id: "blueprint", name: "藍圖風" }, { id: "origami", name: "摺紙風" }, { id: "candy-cane", name: "糖果風" },
            { id: "tech-light", name: "科技風" }, { id: "notebook", name: "筆記風" }
        ];

        let gameData = {}, categoryProgress = {}, categoryColors = {}, cardMetadata = {};
        let currentCategory = '', currentCardIndex = null, isAnimating = false, currentThemeId = 'pop';
        let audioCtx = null, currentTab = 'all';

        // --- 核心初始化 ---
        window.initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); };
        
        function playSound(type) { 
            if (!audioCtx) return; 
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), now = audioCtx.currentTime;
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'pop') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'shuffle') {
                for(let i=0; i<5; i++){
                    const t = now + (i*0.05);
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(400 + (i*100), t);
                    g.gain.setValueAtTime(0.01, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
                    o.start(t); o.stop(t+0.05);
                }
            }
        }

        window.initApp = async () => {
            const loading = document.getElementById('aiLoading');
            loading.style.display = 'flex';
            
            const name = localStorage.getItem(STORAGE_KEYS.USERNAME);
            if (name) updateWelcomeUI(name);
            
            const prog = localStorage.getItem(STORAGE_KEYS.PROGRESS);
            if (prog) { 
                const data = JSON.parse(prog); 
                Object.keys(data).forEach(cat => { categoryProgress[cat] = new Set(data[cat]); }); 
            }
            const meta = localStorage.getItem(STORAGE_KEYS.METADATA);
            if (meta) { cardMetadata = JSON.parse(meta); }

            await autoImport();
            window.randomStyle(true);
            loading.style.display = 'none';
        };

        function updateWelcomeUI(name) {
            const welcomeContainer = document.getElementById('welcomeContainer');
            const welcomeMsg = document.getElementById('welcomeMsg');
            if (name && welcomeContainer && welcomeMsg) {
                welcomeMsg.textContent = `歡迎 ${name} 一起改變生命未來式`;
                welcomeContainer.classList.remove('hidden');
                welcomeMsg.classList.add('animate-welcome');
            }
        }

        window.editName = () => {
            const currentName = localStorage.getItem(STORAGE_KEYS.USERNAME);
            document.getElementById('userNameInput').value = currentName || "";
            document.getElementById('nameModal').classList.remove('hidden');
        };

        window.saveUserName = () => {
            const val = document.getElementById('userNameInput').value.trim();
            if (!val) { showToast("名字不能為空"); return; }
            localStorage.setItem(STORAGE_KEYS.USERNAME, val);
            updateWelcomeUI(val);
            document.getElementById('nameModal').classList.add('hidden');
            showToast("名字更新成功！");
        };

        async function autoImport() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csv = await response.text();
                const rows = parseCSV(csv), newData = {};
                if (rows.length > 0) {
                    const headers = rows[0].map(h => h ? h.trim() : "");
                    headers.forEach((h, col) => { 
                        if (h && h !== '未分類') { 
                            newData[h] = []; 
                            for (let r=1; r<rows.length; r++) if(rows[r][col]) newData[h].push(rows[r][col].trim()); 
                        } 
                    });
                    applyNewGameData(newData);
                }
            } catch (err) { showToast("載入失敗"); }
        }

        function applyNewGameData(newData) {
            gameData = newData; 
            Object.keys(gameData).forEach(cat => { if (!gameData[cat].includes(MANDATORY_CARD)) gameData[cat].push(MANDATORY_CARD); });
            
            const select = document.getElementById('categorySelect');
            select.innerHTML = '<option value="all">✨ 全部解答之書 ✨</option>';
            Object.keys(gameData).forEach((cat) => {
                if (!categoryProgress[cat]) categoryProgress[cat] = new Set();
                gameData[cat].sort(() => Math.random() - 0.5);
                const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; select.appendChild(opt);
            });
            window.switchCategory('all');
        }

        window.switchCategory = (cat) => {
            currentCategory = cat; renderCards(); updateStats();
        };

        function renderCards() {
            const grid = document.getElementById('cardsGrid'); grid.innerHTML = '';
            if (Object.keys(gameData).length === 0) return;
            
            let itemsToRender = [];
            if (currentCategory === 'all') {
                Object.keys(gameData).forEach(cat => {
                    gameData[cat].forEach((txt, idx) => {
                        if (txt === MANDATORY_CARD) return;
                        itemsToRender.push({ cat, idx, text: txt });
                    });
                });
                itemsToRender.unshift({ cat: '宇宙指引', idx: -1, text: MANDATORY_CARD });
            } else {
                gameData[currentCategory].forEach((txt, idx) => {
                    itemsToRender.push({ cat: currentCategory, idx, text: txt });
                });
            }

            itemsToRender.forEach((item, i) => {
                const isDragon = (item.text === MANDATORY_CARD);
                const done = (categoryProgress[item.cat]?.has(item.idx) || false);
                const numStr = (i + 1).toString();
                
                const container = document.createElement('div');
                container.className = `card-container ${done ? 'card-completed' : ''}`;
                container.innerHTML = `
                    <div class="card-inner" id="card-${item.cat}-${item.idx}-${i}">
                        <div class="card-face card-front">
                            <span class="card-number-text text-2xl">${numStr}</span>
                            <div class="card-bg-icon">${isDragon ? '🐲' : '💎'}</div>
                        </div>
                        <div class="card-face card-back">🐲</div>
                    </div>`;
                container.onclick = () => window.handleCardClick(item.cat, item.idx, i);
                grid.appendChild(container);
            });
        }

        window.handleCardClick = (cat, idx, displayIdx) => {
            if (isAnimating) return;
            const text = (idx === -1) ? MANDATORY_CARD : gameData[cat][idx];
            const el = document.getElementById(`card-${cat}-${idx}-${displayIdx}`);
            if(el) el.classList.add('is-flipped');
            
            setTimeout(() => {
                document.getElementById('overlayText').textContent = text;
                document.getElementById('answerCategoryTag').textContent = cat;
                document.getElementById('ratingSection').style.display = (text === MANDATORY_CARD) ? 'none' : 'flex';
                updateStarUI(cardMetadata[text]?.rating || 0);
                currentCardIndex = { cat, idx, text, displayIdx };
                document.getElementById('answerOverlay').classList.replace('hidden', 'flex');
                playSound('pop');
            }, 350);
        };

        window.shuffleGame = () => {
            playSound('shuffle');
            // 動畫：讓未翻開的牌卡晃動
            document.querySelectorAll('.card-container:not(.card-completed)').forEach(el => {
                el.classList.add('shuffle-active');
                setTimeout(() => el.classList.remove('shuffle-active'), 500);
            });

            // 邏輯：保留已翻開的索引文字，只打亂未翻開的部分
            Object.keys(gameData).forEach(cat => {
                const prog = categoryProgress[cat];
                const unFlippedIndices = [];
                const unFlippedTexts = [];
                
                gameData[cat].forEach((txt, idx) => {
                    if (!prog.has(idx)) {
                        unFlippedIndices.push(idx);
                        unFlippedTexts.push(txt);
                    }
                });
                
                // 打亂未翻開的文字
                unFlippedTexts.sort(() => Math.random() - 0.5);
                
                // 放回原位
                unFlippedIndices.forEach((origIdx, i) => {
                    gameData[cat][origIdx] = unFlippedTexts[i];
                });
            });
            
            setTimeout(() => {
                renderCards();
                showToast("未探索牌卡已重新洗牌 🌀");
            }, 500);
        };

        window.updateRatingFromUI = (s) => {
            const info = currentCardIndex;
            const timestamp = Date.now();
            cardMetadata[info.text] = { rating: s, category: info.cat, timestamp: timestamp, flipTimestamp: (cardMetadata[info.text]?.flipTimestamp || timestamp) };
            localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
            updateStarUI(s);
            showToast(`評分已記錄 ${s}★`);
        };

        window.updateRatingFromFav = (text, cat, s) => {
            const timestamp = Date.now();
            cardMetadata[text] = { rating: s, category: cat, timestamp: timestamp, flipTimestamp: (cardMetadata[text]?.flipTimestamp || timestamp) };
            localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
            filterFavs();
        };

        function updateStarUI(s) { document.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('active', i < s)); }

        window.closeAnswer = () => {
            const info = currentCardIndex;
            if (!info) return;
            document.getElementById('answerOverlay').classList.replace('flex', 'hidden');
            const el = document.getElementById(`card-${info.cat}-${info.idx}-${info.displayIdx}`);
            if (el) el.classList.remove('is-flipped');
            
            if (info.idx !== -1 && !categoryProgress[info.cat]?.has(info.idx)) {
                categoryProgress[info.cat].add(info.idx);
                if (!cardMetadata[info.text]) cardMetadata[info.text] = { category: info.cat, flipTimestamp: Date.now(), rating: 0 };
                const saveObj = {};
                Object.keys(categoryProgress).forEach(c => saveObj[c] = Array.from(categoryProgress[c]));
                localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(saveObj));
                localStorage.setItem(STORAGE_KEYS.METADATA, JSON.stringify(cardMetadata));
                renderCards(); updateStats();
            }
            currentCardIndex = null;
        };

        window.randomStyle = (skip) => {
            let next; do { next = THEMES[Math.floor(Math.random() * THEMES.length)]; } while (next.id === currentThemeId);
            currentThemeId = next.id; document.body.className = `theme-${next.id}`;
            if (!skip) {
                const g = document.getElementById('giantThemeName'); g.textContent = next.name; g.classList.remove('active');
                void g.offsetWidth; g.classList.add('active');
            }
        };

        function updateStats() {
            let total = 0, done = 0;
            Object.keys(gameData).forEach(cat => {
                total += gameData[cat].filter(t => t !== MANDATORY_CARD).length;
                gameData[cat].forEach((t, i) => { if (t !== MANDATORY_CARD && categoryProgress[cat].has(i)) done++; });
            });
            document.getElementById('statCompleted').textContent = done;
            document.getElementById('statRemaining').textContent = total - done;
        }

        window.openRecordModal = () => { 
            if (!localStorage.getItem(STORAGE_KEYS.USERNAME)) { document.getElementById('nameModal').classList.remove('hidden'); return; }
            document.getElementById('recordModal').classList.replace('hidden', 'flex'); filterFavs(); 
        };
        window.closeRecordModal = () => { document.getElementById('recordModal').classList.replace('flex', 'hidden'); };
        window.changeRecordTab = (tab) => { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tab)); filterFavs(); };

        function filterFavs() {
            const list = document.getElementById('favoriteList'); list.innerHTML = '';
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] })).filter(i => i.text !== MANDATORY_CARD);
            if (currentTab === 'all') items.sort((a,b) => b.flipTimestamp - a.flipTimestamp);
            else if (currentTab === 'rated') { items = items.filter(i => i.rating > 0); items.sort((a,b) => b.rating - a.rating); }
            else if (currentTab === 'unrated') items = items.filter(i => (i.rating||0) === 0);
            else { const s = parseInt(currentTab.replace('star','')); items = items.filter(i => i.rating === s); }

            if (items.length === 0) { list.innerHTML = '<p class="text-center opacity-30 italic p-10">尚無內容</p>'; return; }
            items.forEach(i => {
                const d = document.createElement('div'); d.className = "bg-white border-4 border-black p-4 shadow-[4px_4px_0px_#000]";
                let ss = ''; for(let n=1; n<=5; n++) ss += `<span class="list-star ${n<=i.rating?'active':''}" onclick="window.updateRatingFromFav('${i.text.replace(/'/g,"\\'")}', '${i.category}', ${n})">★</span>`;
                d.innerHTML = `<div class="flex justify-between items-start mb-2"><span class="bg-black text-white text-[10px] px-2 py-1 italic">${i.category}</span><div class="flex gap-1">${ss}</div></div><p class="font-black text-lg text-black">${i.text}</p>`;
                list.appendChild(d);
            });
        }

        // --- 匯出系統 ---
        const getSenderName = () => localStorage.getItem(STORAGE_KEYS.USERNAME) || (Math.random() > 0.5 ? "安安" : "麗麗");

        window.shareSingleCard = async () => {
            const info = currentCardIndex; if (!info) return;
            const name = getSenderName();
            const time = new Date().toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g,'年').replace(' ','日 ');
            document.getElementById('exportSenderInfo').textContent = `寄送人：${name} | ${time}`;
            document.getElementById('exportCardsList').innerHTML = `<div style="display:flex; align-items:flex-start;"><div style="width: 15px; height: 160px; background: black; margin-right: 30px;"></div><div><div style="font-size: 28px; color: #666; font-weight: bold; margin-bottom: 20px;">[ ${info.cat} ]</div><div style="font-size: 52px; font-weight: 900; line-height: 1.3;">${info.text}</div></div></div>`;
            captureAndShare();
        };

        window.shareRecordAsImage = async () => {
            const name = getSenderName();
            const time = new Date().toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g,'年').replace(' ','日 ');
            document.getElementById('exportSenderInfo').textContent = `寄送人：${name} | ${time}`;
            const list = document.getElementById('exportCardsList'); list.innerHTML = '';
            let items = Object.keys(cardMetadata).map(t => ({ text: t, ...cardMetadata[t] })).filter(i => i.text !== MANDATORY_CARD);
            if (currentTab === 'all') items.sort((a,b) => b.flipTimestamp - a.flipTimestamp);
            else if (currentTab === 'rated') items = items.filter(i => i.rating > 0).sort((a,b) => b.rating - a.rating);
            else if (currentTab === 'unrated') items = items.filter(i => (i.rating||0) === 0);
            else items = items.filter(i => i.rating === parseInt(currentTab.replace('star','')));

            if(items.length === 0) return;
            items.forEach(i => {
                list.innerHTML += `<div style="display:flex; align-items:flex-start; margin-bottom: 60px;"><div style="width: 12px; height: 120px; background: black; margin-right: 25px;"></div><div><div style="font-size: 20px; color: #666; font-weight: bold; margin-bottom: 10px;">[ ${i.category} ]</div><div style="font-size: 38px; font-weight: 900; line-height: 1.3;">${i.text}</div></div></div>`;
            });
            captureAndShare();
        };

        async function captureAndShare() {
            showToast("圖片生成中...");
            const temp = document.getElementById('exportTemplate');
            try {
                const canvas = await html2canvas(temp, { scale: 2, backgroundColor: 'white' });
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                const file = new File([blob], 'BetterYou.png', { type: 'image/png' });
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) && navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '改變生命未來式' });
                } else {
                    const l = document.createElement('a'); l.download = 'BeABetterYou.png'; l.href = canvas.toDataURL(); l.click();
                    showToast("已自動下載圖片 💾");
                }
            } catch (e) { showToast("生成失敗"); }
        }

        window.shareApp = async () => { const d = { title: '改變生命未來式', url: window.location.href }; if (navigator.share) await navigator.share(d); else { const i = document.createElement('input'); i.value = window.location.href; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i); showToast("網址已複製"); } };
        function parseCSV(t) { let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0; for (let l of t) { if ('"' === l) { if (s && l === p) row[i] += l; s = !s; } else if (',' === l && s) l = row[++i] = ''; else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = row[i = 0] = '']; } else row[i] += l; p = l; } return ret; }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500); }

        window.initApp();
    </script>
</body>
</html>
